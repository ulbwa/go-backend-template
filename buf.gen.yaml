version: v2

# Remote plugins are fetched and cached by buf on first run — no local protoc or
# protoc-gen-go installation required.
#
# Do NOT edit generated files under pkg/pb/ — regenerate with: task generate
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/pb
    opt: paths=source_relative

  - remote: buf.build/grpc/go
    out: pkg/pb
    opt: paths=source_relative

inputs:
  - directory: proto
